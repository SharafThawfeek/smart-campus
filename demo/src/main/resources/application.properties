# ============================================
# Smart Campus Operations Hub - Configuration
# ============================================

spring.application.name=smart-campus-hub

# ---- MySQL Database Configuration ----
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate Configuration ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Server Configuration ----
server.port=8080

# ---- File Upload Configuration ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ---- Custom App Properties ----
# JWT Configuration
app.jwt.secret=SmartCampusHub2026SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!!
app.jwt.expiration-ms=86400000

# Google OAuth2 Client ID (replace with your actual Google Client ID)
app.google.client-id=107992358925-74f1s1lb7sothil8srof15ogodkv61jh.apps.googleusercontent.com

# File upload directory
app.upload.dir=uploads
